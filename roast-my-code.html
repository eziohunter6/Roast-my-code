<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roast My Code</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0e0c09;
  --surface: #161410;
  --border: #2a2520;
  --border2: #3a3028;
  --fire: #ff4d00;
  --fire2: #ff8c00;
  --fire3: #ffc947;
  --text: #f5f0e8;
  --muted: #7a7060;
  --green: #4ade80;
  --red: #ff4d4d;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Scanlines effect */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
  z-index: 100;
}

.layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto 1fr;
  min-height: 100vh;
  gap: 0;
}

/* Header */
.header {
  grid-column: 1 / -1;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 32px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}

.logo-area {
  display: flex;
  align-items: center;
  gap: 14px;
}

.fire-icon {
  font-size: 26px;
  animation: flicker 1.8s ease-in-out infinite alternate;
}
@keyframes flicker {
  0% { transform: scaleY(1) rotate(-2deg); filter: brightness(1); }
  25% { transform: scaleY(1.05) rotate(1deg); filter: brightness(1.2); }
  50% { transform: scaleY(0.98) rotate(-1deg); filter: brightness(0.9); }
  75% { transform: scaleY(1.03) rotate(2deg); filter: brightness(1.1); }
  100% { transform: scaleY(1.01) rotate(-1deg); filter: brightness(1.05); }
}

.logo-text {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.logo-text span { color: var(--fire); }

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.persona-select {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 12px;
  padding: 7px 12px;
  border-radius: 4px;
  cursor: pointer;
  outline: none;
}
.persona-select:focus { border-color: var(--fire); }

.severity-display {
  font-size: 11px;
  font-family: 'Syne Mono', monospace;
  color: var(--muted);
}
.severity-display span { color: var(--fire3); }

/* Left panel - code input */
.panel-left {
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}

.panel-right {
  display: flex;
  flex-direction: column;
}

.panel-header {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(255,255,255,0.01);
}

.panel-title {
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 8px;
}
.panel-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--muted);
}
.panel-dot.red { background: #ff5f57; }
.panel-dot.yellow { background: #febc2e; }
.panel-dot.green { background: #28c840; }

.window-controls {
  display: flex;
  gap: 6px;
}

#code-editor {
  flex: 1;
  background: transparent;
  border: none;
  color: #c8c0b0;
  font-family: 'Syne Mono', monospace;
  font-size: 13px;
  line-height: 1.7;
  padding: 24px;
  resize: none;
  outline: none;
  min-height: 320px;
  tab-size: 2;
}
#code-editor::placeholder { color: #3a3028; }

.panel-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(255,255,255,0.01);
}

.line-count {
  font-size: 11px;
  font-family: 'Syne Mono', monospace;
  color: var(--muted);
}

.roast-btn {
  background: var(--fire);
  color: #fff;
  border: none;
  border-radius: 4px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.05em;
  padding: 11px 24px;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  gap: 8px;
  position: relative;
  overflow: hidden;
}
.roast-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
}
.roast-btn:hover { background: #ff6520; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(255,77,0,0.3); }
.roast-btn:active { transform: translateY(0); }
.roast-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Right panel - roast output */
.roast-output {
  flex: 1;
  padding: 24px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 16px;
  color: var(--muted);
  padding: 40px;
}

.empty-icon { font-size: 48px; opacity: 0.4; }

.empty-state h3 {
  font-size: 16px;
  font-weight: 500;
  color: #4a4038;
}

.empty-state p {
  font-size: 13px;
  line-height: 1.6;
  max-width: 280px;
  color: #3a3028;
}

/* Roast card */
.roast-card {
  opacity: 0;
  transform: translateY(12px);
  transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}
.roast-card.show { opacity: 1; transform: translateY(0); }

.roast-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.persona-avatar {
  width: 40px; height: 40px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--fire), var(--fire2));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.persona-meta .persona-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}
.persona-meta .persona-sub {
  font-size: 11px;
  color: var(--muted);
}

.score-badge {
  margin-left: auto;
  text-align: right;
}
.score-num {
  font-size: 28px;
  font-weight: 700;
  font-family: 'Syne Mono', monospace;
  line-height: 1;
}
.score-label { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

/* Roast sections */
.roast-section {
  margin-bottom: 20px;
  opacity: 0;
  transform: translateY(8px);
  transition: all 0.5s ease;
}
.roast-section.show { opacity: 1; transform: translateY(0); }

.section-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  font-weight: 500;
  margin-bottom: 8px;
  padding: 3px 10px;
  border-radius: 100px;
}
.tag-fire { background: rgba(255,77,0,0.15); color: var(--fire2); border: 1px solid rgba(255,77,0,0.2); }
.tag-warning { background: rgba(255,196,71,0.1); color: var(--fire3); border: 1px solid rgba(255,196,71,0.2); }
.tag-good { background: rgba(74,222,128,0.1); color: var(--green); border: 1px solid rgba(74,222,128,0.2); }
.tag-verdict { background: rgba(255,77,0,0.2); color: #fff; border: 1px solid rgba(255,77,0,0.3); }

.section-content {
  font-size: 14px;
  line-height: 1.75;
  color: #c0b8a8;
}

.issues-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.issues-list li {
  display: flex;
  gap: 10px;
  font-size: 13px;
  line-height: 1.6;
  color: #c0b8a8;
  padding: 10px 14px;
  background: rgba(255,255,255,0.02);
  border-radius: 4px;
  border-left: 2px solid var(--border2);
}
.issues-list li .bullet { color: var(--fire); flex-shrink: 0; }

.verdict-box {
  background: linear-gradient(135deg, rgba(255,77,0,0.08), rgba(255,140,0,0.05));
  border: 1px solid rgba(255,77,0,0.2);
  border-radius: 8px;
  padding: 20px;
  font-size: 15px;
  line-height: 1.7;
  color: #e0d8c8;
  font-style: italic;
}

/* Score color */
.score-high { color: var(--green); }
.score-mid { color: var(--fire3); }
.score-low { color: var(--fire); }

/* Loading animation */
.loading-roast {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  flex: 1;
  padding: 40px;
}

.flame-loader {
  font-size: 40px;
  animation: flamePulse 0.8s ease-in-out infinite alternate;
}
@keyframes flamePulse {
  from { transform: scale(1); filter: brightness(1); }
  to { transform: scale(1.15); filter: brightness(1.3); }
}

.loading-text-lines {
  display: flex;
  flex-direction: column;
  gap: 6px;
  text-align: center;
}

.loading-msg {
  font-size: 14px;
  color: var(--muted);
  transition: opacity 0.4s;
}

.loading-sub {
  font-size: 11px;
  color: var(--border2);
  font-family: 'Syne Mono', monospace;
}

/* Bottom bar */
.bottom-bar {
  grid-column: 1 / -1;
  border-top: 1px solid var(--border);
  padding: 12px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--surface);
}
.bottom-tag {
  font-size: 11px;
  color: var(--muted);
  font-family: 'Syne Mono', monospace;
}
.bottom-tag a { color: var(--fire2); text-decoration: none; }
</style>
</head>
<body>

<div class="layout">
  <!-- Header -->
  <header class="header">
    <div class="logo-area">
      <div class="fire-icon">🔥</div>
      <div class="logo-text">Roast My <span>Code</span></div>
    </div>
    <div class="header-right">
      <select class="persona-select" id="persona-select">
        <option value="senior">😤 Senior Dev (10 YOE)</option>
        <option value="gordon">👨‍🍳 Gordon Ramsay Mode</option>
        <option value="shakespere">📜 Shakespearean Scholar</option>
        <option value="therapist">🛋️ Concerned Therapist</option>
        <option value="startup">🚀 Silicon Valley Bro</option>
      </select>
    </div>
  </header>

  <!-- Left: Code Input -->
  <div class="panel-left">
    <div class="panel-header">
      <div class="window-controls">
        <div class="panel-dot red"></div>
        <div class="panel-dot yellow"></div>
        <div class="panel-dot green"></div>
      </div>
      <div class="panel-title">your_code.js</div>
    </div>

    <textarea id="code-editor" placeholder="// Paste your code here and prepare&#10;// for the most constructive criticism&#10;// of your entire career.&#10;&#10;function fetchData(url) {&#10;  var data = null;&#10;  $.ajax({url: url, async: false, success: function(r) { data = r; }});&#10;  return data;&#10;}"></textarea>

    <div class="panel-footer">
      <div class="line-count" id="line-count">0 lines</div>
      <button class="roast-btn" id="roast-btn" onclick="roastCode()">
        🔥 Roast It
      </button>
    </div>
  </div>

  <!-- Right: Roast Output -->
  <div class="panel-right">
    <div class="panel-header">
      <div class="panel-title">
        <div class="panel-dot" style="background: var(--fire); box-shadow: 0 0 6px var(--fire);"></div>
        The Verdict
      </div>
    </div>

    <div class="roast-output" id="roast-output">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">🎯</div>
        <h3>No code, no roast.</h3>
        <p>Paste some code on the left and hit the button. We promise it won't hurt.<br><br><em style="color: #4a3a30">...much.</em></p>
      </div>
    </div>
  </div>

  <!-- Bottom bar -->
  <footer class="bottom-bar">
    <div class="bottom-tag">roast-my-code v1.0.0 · <a href="#">AI Practices</a></div>
    <div class="bottom-tag" id="status-bar">ready</div>
  </footer>
</div>

<script>
// Line count updater
const editor = document.getElementById('code-editor');
const lineCount = document.getElementById('line-count');

editor.addEventListener('input', () => {
  const lines = editor.value.split('\n').length;
  lineCount.textContent = `${lines} line${lines !== 1 ? 's' : ''}`;
});

const personas = {
  senior: {
    name: 'Senior Dev (10 YOE)',
    emoji: '😤',
    style: 'a battle-hardened senior developer who has seen every bad coding pattern imaginable. You\'re exasperated but ultimately want to help. Mix brutal honesty with genuine wisdom. Reference specific bad practices by name.'
  },
  gordon: {
    name: 'Gordon Ramsay',
    emoji: '👨‍🍳',
    style: 'Gordon Ramsay but for code instead of food. Use cooking metaphors. Be dramatically horrified. Say things like "This code is RAW!" and "Shut it down!". Still give real technical feedback wrapped in culinary drama.'
  },
  shakespere: {
    name: 'Shakespearean Scholar',
    emoji: '📜',
    style: 'a Shakespearean scholar who has been forced to review modern code. Use archaic English, dramatic soliloquies, and Shakespearean metaphors. Reference plays. Still give real technical feedback but in iambic-adjacent language.'
  },
  therapist: {
    name: 'Concerned Therapist',
    emoji: '🛋️',
    style: 'a therapist who is deeply concerned about the psychological state of the developer. Analyze the code as if it reveals deep emotional trauma. Speak softly but say genuinely devastating things about the code quality.'
  },
  startup: {
    name: 'Silicon Valley Bro',
    emoji: '🚀',
    style: 'a Silicon Valley startup founder who uses buzzwords constantly but still identifies real technical problems. Say things like "This doesn\'t scale", "We need to disrupt this function", use terms like "10x", "synergy", "move fast". Still give real technical feedback.'
  }
};

const loadingMessages = [
  'Reading your sins…',
  'Consulting the ancients…',
  'Preparing emotional damage…',
  'Calculating technical debt…',
  'Summoning the roast…'
];

async function roastCode() {
  const code = editor.value.trim();
  if (!code) {
    editor.focus();
    editor.style.borderLeft = '2px solid var(--fire)';
    setTimeout(() => editor.style.borderLeft = '', 800);
    return;
  }

  const personaKey = document.getElementById('persona-select').value;
  const persona = personas[personaKey];
  const btn = document.getElementById('roast-btn');
  const output = document.getElementById('roast-output');
  const statusBar = document.getElementById('status-bar');

  btn.disabled = true;
  btn.textContent = '🔥 Roasting…';
  statusBar.textContent = 'analyzing code…';

  // Show loading
  output.innerHTML = `
    <div class="loading-roast">
      <div class="flame-loader">🔥</div>
      <div class="loading-text-lines">
        <div class="loading-msg" id="loading-msg">${loadingMessages[0]}</div>
        <div class="loading-sub">this may sting slightly</div>
      </div>
    </div>`;

  let msgIdx = 0;
  const msgInterval = setInterval(() => {
    msgIdx = (msgIdx + 1) % loadingMessages.length;
    const el = document.getElementById('loading-msg');
    if (el) el.textContent = loadingMessages[msgIdx];
  }, 1200);

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `You are ${persona.style}

Review this code and respond ONLY with valid JSON (no markdown, no code fences):

\`\`\`
${code.substring(0, 2000)}
\`\`\`

Respond with exactly:
{
  "score": <integer 1-100, be honest and harsh>,
  "opening": "a 1-2 sentence opener in your persona's voice, setting the tone",
  "issues": [
    "specific technical issue with persona-flavored commentary",
    "another specific issue",
    "another issue"
  ],
  "one_good_thing": "one genuine thing that isn't terrible about this code, still in persona voice",
  "verdict": "a 2-3 sentence dramatic closing verdict in persona voice. Make it memorable. End with actual advice."
}

Be genuinely technically accurate while staying in persona. The issues must be real code problems.`
        }]
      })
    });

    const data = await res.json();
    clearInterval(msgInterval);

    const text = data.content.map(b => b.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    renderRoast(parsed, persona);
    statusBar.textContent = `score: ${parsed.score}/100`;

  } catch (e) {
    clearInterval(msgInterval);
    output.innerHTML = `<div class="empty-state"><div class="empty-icon">💥</div><h3>The roaster crashed.</h3><p>Even the AI couldn't handle this one.</p></div>`;
    statusBar.textContent = 'error';
    console.error(e);
  }

  btn.disabled = false;
  btn.textContent = '🔥 Roast It';
}

function renderRoast(data, persona) {
  const score = data.score || 50;
  const scoreClass = score >= 70 ? 'score-high' : score >= 40 ? 'score-mid' : 'score-low';

  const output = document.getElementById('roast-output');
  output.innerHTML = `
    <div class="roast-card" id="roast-card">
      <div class="roast-header">
        <div class="persona-avatar">${persona.emoji}</div>
        <div class="persona-meta">
          <div class="persona-name">${persona.name}</div>
          <div class="persona-sub">Code Reviewer</div>
        </div>
        <div class="score-badge">
          <div class="score-num ${scoreClass}">${score}</div>
          <div class="score-label">/ 100</div>
        </div>
      </div>

      <div class="roast-section" id="sec-opening">
        <div class="section-tag tag-fire">🔥 Opening</div>
        <div class="section-content">${data.opening || ''}</div>
      </div>

      <div class="roast-section" id="sec-issues">
        <div class="section-tag tag-warning">⚠️ Issues Found</div>
        <ul class="issues-list" id="issues-list"></ul>
      </div>

      <div class="roast-section" id="sec-good">
        <div class="section-tag tag-good">✓ One Saving Grace</div>
        <div class="section-content">${data.one_good_thing || ''}</div>
      </div>

      <div class="roast-section" id="sec-verdict">
        <div class="section-tag tag-verdict">⚖️ Final Verdict</div>
        <div class="verdict-box">${data.verdict || ''}</div>
      </div>
    </div>`;

  // Populate issues
  const issuesList = document.getElementById('issues-list');
  (data.issues || []).forEach(issue => {
    const li = document.createElement('li');
    li.innerHTML = `<span class="bullet">→</span><span>${issue}</span>`;
    issuesList.appendChild(li);
  });

  // Stagger animations
  setTimeout(() => document.getElementById('roast-card')?.classList.add('show'), 50);
  setTimeout(() => document.getElementById('sec-opening')?.classList.add('show'), 200);
  setTimeout(() => document.getElementById('sec-issues')?.classList.add('show'), 400);
  setTimeout(() => document.getElementById('sec-good')?.classList.add('show'), 600);
  setTimeout(() => document.getElementById('sec-verdict')?.classList.add('show'), 800);
}

// Init line count
const initLines = editor.value.split('\n').length;
lineCount.textContent = `${initLines} lines`;
</script>
</body>
</html>
